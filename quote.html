<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Custom Quote | Open Claw Skills</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f172a;
      --bg-card: #1e293b;
      --text-primary: #f8fafc;
      --text-secondary: #94a3b8;
      --accent-orange: #f97316;
      --accent-gold: #fbbf24;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-dark);
      color: var(--text-primary);
      line-height: 1.6;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 20px;
    }
    .container { max-width: 600px; width: 100%; }
    .form-card {
      background: var(--bg-card);
      border-radius: 20px;
      padding: 48px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    h1 {
      font-size: 2rem; margin-bottom: 8px;
      background: linear-gradient(135deg, var(--accent-orange), var(--accent-gold));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .subtitle { color: var(--text-secondary); margin-bottom: 32px; }
    .form-group { margin-bottom: 24px; }
    label {
      display: block; margin-bottom: 8px;
      font-weight: 500; font-size: 0.9rem;
    }
    input, textarea, select {
      width: 100%; padding: 14px 16px;
      background: var(--bg-dark);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: var(--text-primary);
      font-size: 1rem;
      font-family: inherit;
    }
    input:focus, textarea:focus, select:focus {
      outline: none; border-color: var(--accent-orange);
    }
    textarea { min-height: 120px; resize: vertical; }
    .btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, var(--accent-orange), var(--accent-gold));
      border: none; border-radius: 10px;
      color: white; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: transform 0.3s;
    }
    .btn:hover { transform: translateY(-2px); }
    .back-link {
      display: block; text-align: center;
      margin-top: 24px; color: var(--text-secondary);
      text-decoration: none;
    }
    .back-link:hover { color: var(--text-primary); }
  </style>
</head>
<body>
  <div class="container">
    <div class="form-card">
      <h1>Request Custom Quote</h1>
      <p class="subtitle">Tell us about your automation needs and we'll create a custom solution for you.</p>
      
      <form action="mailto:skills@aiopenclawskills.com" method="post" enctype="text/plain">
        <div class="form-group">
          <label for="name">Full Name *</label>
          <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="company">Company Name</label>
          <input type="text" id="company" name="company">
        </div>
        
        <div class="form-group">
          <label for="budget">Approximate Budget</label>
          <select id="budget" name="budget">
            <option value="">Select a range...</option>
            <option value="2500-5000">$2,500 - $5,000</option>
            <option value="5000-10000">$5,000 - $10,000</option>
            <option value="10000-25000">$10,000 - $25,000</option>
            <option value="25000+">$25,000+</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="needs">Describe Your Automation Needs *</label>
          <textarea id="needs" name="needs" placeholder="Tell us about your current workflows, pain points, and what you'd like to automate..." required></textarea>
        </div>
        
        <button type="submit" class="btn">Request My Custom Quote →</button>
      </form>
      
      <a href="/" class="back-link">← Back to Homepage</a>
    </div>
  </div>
</body>
</html>
